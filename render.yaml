services:
  - type: web
    name: viralprinter-web
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - fromGroup: viralprinter-shared
      - key: NODE_ENV
        value: production
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_WORKFLOWS_SERVICE_SLUG
        value: viralprinter-workflows

  - type: worker
    name: viralprinter-workflows
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev --legacy-peer-deps && npm run build:worker
    startCommand: npm run start:worker
    envVars:
      - fromGroup: viralprinter-shared
